<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Flip Card Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Memory Flip Card Game</h1>
            <div class="game-info">
                <div class="score">Score: <span id="score">0</span></div>
                <div class="moves">Moves: <span id="moves">0</span></div>
                <div class="timer">Time: <span id="timer">00:00</span></div>
            </div>
            <button id="reset-btn" class="reset-btn">🔄 New Game</button>
        </header>
        
        <div class="game-board" id="game-board">
            <!-- Cards will be generated here -->
        </div>
        
        <div class="game-over" id="game-over" style="display: none;">
            <div class="game-over-content">
                <h2>🎉 Congratulations!</h2>
                <p>You completed the game in <span id="final-time">00:00</span></p>
                <p>Total moves: <span id="final-moves">0</span></p>
                <p>Score: <span id="final-score">0</span></p>
                <button id="play-again-btn" class="play-again-btn">🎮 Play Again</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
