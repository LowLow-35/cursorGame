<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Flip Card Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>🧠 Memory Flip Card Game</h1>
            <div class="game-stats">
                <div class="stat">
                    <span class="label">Moves:</span>
                    <span class="value" id="moves">0</span>
                </div>
                <div class="stat">
                    <span class="label">Matches:</span>
                    <span class="value" id="matches">0</span>
                </div>
                <div class="stat">
                    <span class="label">Time:</span>
                    <span class="value" id="timer">00:00</span>
                </div>
            </div>
            <button id="reset-btn" class="reset-btn">🔄 New Game</button>
        </header>
        
        <main>
            <div class="game-board" id="game-board">
                <!-- Cards will be generated by JavaScript -->
            </div>
        </main>
        
        <div class="game-over-modal" id="game-over-modal">
            <div class="modal-content">
                <h2>🎉 Congratulations!</h2>
                <p>You completed the game!</p>
                <div class="final-stats">
                    <p>Moves: <span id="final-moves"></span></p>
                    <p>Time: <span id="final-time"></span></p>
                </div>
                <button id="play-again-btn" class="play-again-btn">Play Again</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
